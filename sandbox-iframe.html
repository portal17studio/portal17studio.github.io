<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sandbox.css">
  <style>
    body { background: transparent; padding: 0; margin: 0; }
  </style>
</head>
<body>
  <form id="iframeForm" onsubmit="event.preventDefault(); document.getElementById('iframeResult').innerText = 'Display name updated successfully.';">
    <label for="iframeInput">Display Name</label>
    <input type="text" id="iframeInput" placeholder="Ada Lovelace">
    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Update name</button>
    <div id="iframeResult" class="sbx-result" style="margin-top: 10px; color: #4ade80;"></div>
  </form>
</body>
</html>
